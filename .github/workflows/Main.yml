name: Host Docker Virtual Browser Online

on:
  workflow_dispatch: # Run manually with one click from the Actions tab

jobs:
  launch-virtual-browser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # MAXED PERFORMANCE: Allocated 6gb of shared memory. 
      # This utilizes the absolute limit of the GitHub runner's RAM for perfect streaming.
      - name: Start Isolated Docker Browser
        run: |
          docker run -d \
            --name=virtual-browser \
            --ipc=host \
            --shm-size="6gb" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Kolkata \
            -e CHROME_CLI=https://www.google.com \
            -p 3000:3000 \
            lscr.io/linuxserver/chromium:latest

      # EXPOSES TUNNEL: Uses an open-source, zero-setup tunnel engine to route 
      # port 3000 directly to a public address without signup barriers.
      - name: Create Web Connection & Expose Stream
        run: |
          echo "========================================================"
          echo "🚀 SPARKING ENGINE & INITIALIZING WEBSTREAM..."
          echo "========================================================"
          
          # Initialize background logging
          touch stream_tunnel.log
          
          # Open direct SSH reverse-forward tunnel via localhost.run
          ssh -o StrictHostKeyChecking=no -R 80:localhost:3000 nokey@localhost.run > stream_tunnel.log 2>&1 &
          
          # Gives the websocket handshake exactly 30 seconds to fully stabilize
          echo "⏳ Waiting 30 seconds for streaming connection to secure..."
          sleep 30
          
          # Extract live endpoint from stream logs
          LIVE_URL=$(grep -o 'https://[^ ]*\.lhr\.life' stream_tunnel.log | head -n 1)
          
          if [ -z "$LIVE_URL" ]; then
            echo "❌ Link creation paused. Connection log output:"
            cat stream_tunnel.log
            exit 1
          fi
          
          echo "========================================================"
          echo "🎉 DOCKER VIRTUAL BROWSER ENGINE RUNNING SUCCESSFULLY!"
          echo "👉 LIVE URL: $LIVE_URL"
          echo "========================================================"
          echo "Keep this GitHub browser tab open to stay connected."
          echo "Session automatically clean-wipes after 6 hours."
          
          # Keeps container instance alive for active web browsing session
          sleep 21600
          
